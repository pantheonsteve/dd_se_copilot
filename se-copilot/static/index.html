<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SE Copilot</title>
<link rel="stylesheet" href="/static/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <span>SE Copilot</span>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <button class="nav-item active" data-page="companies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M9 16h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M14 16h1"/><path d="M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16"/></svg>
        <span>Companies</span>
      </button>
      <button class="nav-item" data-page="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-page="hypothesis">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Hypothesis</span>
      </button>
      <button class="nav-item" data-page="research">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Research</span>
      </button>
      <button class="nav-item" data-page="demo-planner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Demo Planner</span>
      </button>
      <button class="nav-item" data-page="expansion">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span>Expansion</span>
      </button>
      <button class="nav-item" data-page="next-steps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Next Steps</span>
      </button>
      <button class="nav-item" data-page="precall-brief">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Pre-Call Brief</span>
      </button>
      <button class="nav-item" data-page="release-digest">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v2H4z"/><path d="M4 10h16v2H4z"/><path d="M4 16h10v2H4z"/><circle cx="19" cy="17" r="3"/><line x1="21" y1="19" x2="22.5" y2="20.5"/></svg>
        <span>Release Digest</span>
      </button>
      <button class="nav-item" data-page="call-notes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.05 5A5 5 0 0119 8.95M15.05 1A9 9 0 0123 8.94M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        <span>Call Notes</span>
      </button>
      <button class="nav-item" data-page="library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span>Library</span>
      </button>
      <button class="nav-item" data-page="agents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
        <span>Agents</span>
      </button>
    </nav>
    <div class="sidebar-toggle">
      <button onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <span class="topbar-title" id="pageTitle">Dashboard</span>
      <div class="topbar-spacer"></div>
      <div class="health-indicator" id="healthIndicator">
        <span class="dot" id="healthDot"></span>
        <span id="healthText">Checking...</span>
      </div>
    </header>

    <main class="content-area" id="contentArea">
      <div class="page active" id="page-home"></div>
      <div class="page" id="page-hypothesis"></div>
      <div class="page" id="page-research"></div>
      <div class="page" id="page-demo-planner"></div>
      <div class="page" id="page-expansion"></div>
      <div class="page" id="page-next-steps"></div>
      <div class="page" id="page-precall-brief"></div>
      <div class="page" id="page-release-digest"></div>
      <div class="page" id="page-call-notes"></div>
      <div class="page" id="page-companies"></div>
      <div class="page" id="page-library"></div>
      <div class="page" id="page-agents"></div>
    </main>
  </div>
</div>

<!-- Quick Reference panel (used by demo planner) -->
<button class="qr-fab" id="qrFab" onclick="window.demoPlanner && window.demoPlanner.toggleQR()">Quick Ref</button>
<div class="qr-overlay" id="qrOverlay" onclick="window.demoPlanner && window.demoPlanner.toggleQR()"></div>
<div class="qr-panel" id="qrPanel">
  <div class="qr-panel-header">
    <h3>Quick Reference Card</h3>
    <button class="qr-panel-close" onclick="window.demoPlanner && window.demoPlanner.toggleQR()">&times;</button>
  </div>
  <div class="qr-panel-body" id="qrCard"></div>
</div>

<!-- Slides overlay (used by demo planner) -->
<div class="slides-overlay" id="slidesOverlay" onclick="if(event.target===this) window.demoPlanner && window.demoPlanner.closeSlides()">
  <div class="slides-panel">
    <div class="slides-panel-header">
      <h3 id="slidesDeckTitle">Generated Slides</h3>
      <div class="sp-actions">
        <button onclick="window.demoPlanner && window.demoPlanner.regenerateSlides()" id="regenSlidesBtn">Regenerate</button>
        <button onclick="window.demoPlanner && window.demoPlanner.copySlidesJSON()" id="copySlidesBtn">Copy JSON</button>
        <button onclick="window.demoPlanner && window.demoPlanner.exportSlidesJSON()">Export .json</button>
      </div>
      <button class="slides-panel-close" onclick="window.demoPlanner && window.demoPlanner.closeSlides()">&times;</button>
    </div>
    <div class="slides-panel-body" id="slidesPanelBody">
      <div class="slides-loading" id="slidesLoading"><span class="spinner"></span> Generating slides&hellip;</div>
      <div id="slidesContent" class="slides-content"></div>
    </div>
  </div>
</div>

<!-- Datadog RUM / Product Analytics -->
<script src="https://www.datadoghq-browser-agent.com/us1/v5/datadog-rum.js" type="text/javascript"></script>
<script src="/static/js/datadog-rum.js"></script>

<!-- Scripts -->
<script src="/static/js/api.js"></script>
<script src="/static/js/components/markdown.js"></script>
<script src="/static/js/pages/home.js"></script>
<script src="/static/js/pages/hypothesis.js"></script>
<script src="/static/js/pages/research.js"></script>
<script src="/static/js/pages/demo-planner.js"></script>
<script src="/static/js/components/playbook-timeline.js"></script>
<script src="/static/js/pages/expansion.js"></script>
<script src="/static/js/pages/next-steps.js"></script>
<script src="/static/js/pages/precall-brief.js"></script>
<script src="/static/js/pages/release-digest.js"></script>
<script src="/static/js/pages/call-notes.js"></script>
<script src="/static/js/pages/companies.js"></script>
<script src="/static/js/pages/company-detail.js"></script>
<script src="/static/js/pages/library.js"></script>
<script src="/static/js/pages/agents.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
